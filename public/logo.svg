<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Icon mark -->
  <g>
    <!-- Outer ring arc -->
    <circle cx="24" cy="24" r="18" stroke="hsl(350,90%,35%)" stroke-width="2" fill="none" opacity="0.2"/>
    <!-- Calendar/event grid base -->
    <rect x="13" y="15" width="22" height="18" rx="3" fill="hsl(350,90%,35%)" opacity="0.12"/>
    <!-- Top bar -->
    <rect x="13" y="13" width="22" height="5" rx="2" fill="hsl(350,90%,35%)"/>
    <!-- Calendar dots -->
    <rect x="17" y="22" width="4" height="4" rx="1" fill="hsl(350,90%,35%)"/>
    <rect x="23" y="22" width="4" height="4" rx="1" fill="hsl(350,90%,35%)" opacity="0.6"/>
    <rect x="29" y="22" width="4" height="4" rx="1" fill="hsl(350,90%,35%)" opacity="0.3"/>
    <rect x="17" y="28" width="4" height="4" rx="1" fill="hsl(350,90%,35%)" opacity="0.6"/>
    <rect x="23" y="28" width="4" height="4" rx="1" fill="hsl(350,90%,35%)"/>
    <!-- Orbit dot -->
    <circle cx="40" cy="10" r="3.5" fill="hsl(350,90%,35%)"/>
    <circle cx="40" cy="10" r="5.5" stroke="hsl(350,90%,35%)" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="52" y="31" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="800" font-size="20" letter-spacing="-0.5" fill="#1a1a2e">Event</text>
  <text x="105" y="31" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="800" font-size="20" letter-spacing="-0.5" fill="hsl(350,90%,35%)">Verse</text>
</svg>
